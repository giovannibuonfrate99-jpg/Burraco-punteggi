version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: burraco_bot_dev
    environment:
      # Load from .env file (copy from .env.example first!)
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      TARGET_SCORE: ${TARGET_SCORE:-2000}
    restart: unless-stopped
    # Optional: mount volumes for development
    volumes:
      - ./bot.py:/app/bot.py
      - ./database.py:/app/database.py
    # Optional: expose logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# To run locally:
#   cp .env.example .env
#   (fill in .env with actual values)
#   docker-compose up -d
#   docker-compose logs -f bot
#   docker-compose down
