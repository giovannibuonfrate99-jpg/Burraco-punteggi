[pytest]
# Pytest configuration for Burraco Bot

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio support
asyncio_mode = auto

# Verbosity
addopts = -v --tb=short

# Markers
markers =
    unit: Unit tests (database layer, utilities)
    integration: Integration tests (end-to-end flows)
    slow: Slow tests that take >5 seconds
    mock: Tests that use mocked external services

# Coverage
[coverage:run]
source = .
omit =
    tests/*
    .venv/*
    **/__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
